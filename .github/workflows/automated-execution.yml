name: Automated Execution

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Smoke compile
        run: python -m compileall -q whisperjav || exit 1

      - name: Smoke import
        run: python -c "import whisperjav; print(whisperjav.__version__)"
